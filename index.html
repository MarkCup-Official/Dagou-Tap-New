<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#fff2dc" />
<title>大狗Tap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
<style>
  /* 全页面限定调色板：米白底 + 主色黄 + 次色灰（极少点缀色） */
  :root {
    --cream: #fff2dc;   /* 背景 · 米白 */
    --amber: #ffb400;   /* 主色 · 黄 */
    --gray:  #87837e;   /* 次要 · 灰 */
    --coral: #ff5a5f;   /* 点缀（少量） */
    --teal:  #16c2a3;   /* 点缀（少量） */
    --blue:  #3e7bfa;   /* 点缀（少量） */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--cream);
    color: var(--gray);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 纯色背景（固定米白，canvas 未启动时的兜底色） */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    background: var(--cream);
  }

  /* 全屏特效画布（仿 Mikutap：特效铺满全屏、层层叠加） */
  #fx {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  /* 节拍呼吸闪光（主色黄，JS 按节拍驱动） */
  #beatflash {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: var(--amber);
    opacity: 0;
  }

  /* 分区按钮闪光层：点击/滑过时分区短暂显示半透明白色再淡出 */
  #zoneflash {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  .zone-flash {
    position: absolute;
    background: #fff;
    border-radius: 2vmin;
    opacity: 0;
    animation: zoneFade .45s ease-out forwards;
  }
  @keyframes zoneFade {
    0%   { opacity: .45; }
    100% { opacity: 0; }
  }

  /* 大狗 */
  #dog {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    will-change: transform;
  }
  #dog-inner {
    position: relative;
    width: min(56vmin, 400px);
    transition: transform .55s cubic-bezier(.34, 1.9, .64, 1); /* Q弹回弹 */
  }
  #dog-inner img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 18px 40px rgba(135, 131, 126, .4));
  }
  /* 张嘴图叠在闭嘴图之上：下层始终不透明，只切换上层透明度，
     避免交叉淡化时两张图都半透明导致整体变透明 */
  #dog-open {
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
    transition: opacity .08s linear;
  }
  #dog-inner.bark { transform: scale(1.1) rotate(-2deg); }
  #dog-inner.bark #dog-open { opacity: 1; }

  /* 开始遮罩（首次点击解锁音频） */
  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2.2vmin;
    align-items: center;
    justify-content: center;
    background: rgba(255, 242, 220, .9);
    transition: opacity .5s ease;
    cursor: pointer;
  }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay .title {
    font-size: clamp(34px, 8vmin, 72px);
    font-weight: 900;
    letter-spacing: .18em;
    color: var(--amber);
  }
  #overlay .title em { font-style: normal; color: var(--gray); }
  #overlay .sub {
    font-size: clamp(13px, 2.4vmin, 18px);
    letter-spacing: .5em;
    color: var(--gray);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="fx"></canvas>
    <div id="beatflash"></div>
    <div id="zoneflash"></div>

    <div id="dog">
      <div id="dog-inner">
        <img id="dog-close" src="Image/dagou_close_mouth.png" alt="大狗" draggable="false" />
        <img id="dog-open" src="Image/dagou_open_mouth.png" alt="" draggable="false" />
      </div>
    </div>

    <div id="overlay">
      <div class="title">大狗<em>Tap</em></div>
      <div class="sub">点 击 任 意 位 置 开 始</div>
    </div>
  </div>

  <script src="audio-data.js"></script>
  <script src="main.js"></script>
</body>
</html>

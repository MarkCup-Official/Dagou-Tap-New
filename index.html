<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#fff2dc" />
<title>大狗Tap</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐶</text></svg>" />
<script src="//s1.hdslb.com/bfs/seed/toy/app/sdk/toy-sdk.js"></script>
<style>
  /* 全页面限定调色板：米白底 + 主色黄 + 次色灰（极少点缀色） */
  :root {
    --cream: #fff2dc;   /* 背景 · 米白 */
    --amber: #ffb400;   /* 主色 · 黄 */
    --gray:  #87837e;   /* 次要 · 灰 */
    --coral: #ff5a5f;   /* 点缀（少量） */
    --teal:  #16c2a3;   /* 点缀（少量） */
    --blue:  #3e7bfa;   /* 点缀（少量） */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    background: var(--cream);
    color: var(--gray);
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  /* 纯色背景（固定米白，canvas 未启动时的兜底色） */
  #stage {
    position: fixed;
    inset: 0;
    overflow: hidden;
    isolation: isolate;
    background: var(--cream);
    --scene-unit: 200px;
  }

  /* 全屏特效画布（仿 Mikutap：特效铺满全屏、层层叠加） */
  #fx {
    position: absolute;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  /* 常驻作者署名：始终位于页面最前层。
     两行严格等宽；Created by 整体跟拍，MarkCup 每拍依次放大一个字母。 */
  #author-link {
    position: absolute;
    right: max(18px, env(safe-area-inset-right));
    bottom: max(16px, env(safe-area-inset-bottom));
    z-index: 30;
    padding: 10px 12px 11px;
    display: block;
    text-decoration: none;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform .22s ease;
  }
  .author-copy {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    width: 124px;
    gap: 5px;
  }
  .author-label,
  .author-name {
    width: 100%;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }
  .author-label {
    color: rgba(255, 180, 0, .78);
    font: 600 9px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    letter-spacing: 0;
    text-transform: uppercase;
    white-space: nowrap;
    transform-origin: 50% 70%;
    transform:
      translateY(var(--author-lift, 0px))
      scale(var(--author-rhythm-scale, 1));
    transition: color .22s ease;
  }
  .author-name {
    width: calc(100% + 6px);
    margin-left: -3px;
    color: var(--amber);
    font: 700 20px/1.15 "Noto Serif SC", "Songti SC", SimSun, serif;
    letter-spacing: 0;
    white-space: nowrap;
    transition: color .22s ease;
  }
  /* JS 将两行拆成等距字符；仅 MarkCup 字母逐拍放大 */
  .author-letter {
    display: inline-block;
    transform-origin: 50% 72%;
    will-change: transform;
  }
  @media (hover: hover) {
    #author-link:hover { transform: translateY(-2px); }
    #author-link:hover .author-label,
    #author-link:hover .author-name { color: #d88f00; }
  }
  #author-link:focus-visible {
    outline: 2px solid rgba(62, 123, 250, .35);
    outline-offset: 2px;
  }

  /* 分区按钮闪光层：点击/滑过时分区短暂显示半透明白色再淡出 */
  #zoneflash {
    position: absolute;
    inset: 0;
    z-index: 5;
    pointer-events: none;
  }
  /* 可选的按键网格：默认透明，开启后只显示边界，不改变原有白色触发闪光。 */
  #key-grid {
    position: absolute;
    inset: 0;
    z-index: 4;
    display: grid;
    grid-template-columns: repeat(var(--key-grid-cols, 4), minmax(0, 1fr));
    grid-template-rows: repeat(var(--key-grid-rows, 3), minmax(0, 1fr));
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  #key-grid.is-visible { opacity: 1; }
  .key-grid-cell {
    box-shadow: inset 0 0 0 1px rgba(135, 131, 126, .24);
    background: rgba(255, 255, 255, .025);
  }
  .zone-flash {
    position: absolute;
    background: #fff;
    border-radius: 2vmin;
    opacity: 0;
    animation: zoneFade .45s ease-out forwards;
  }
  @keyframes zoneFade {
    0%   { opacity: .45; }
    100% { opacity: 0; }
  }

  /* 大狗 */
  #dog {
    position: absolute;
    inset: 0;
    z-index: 6;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    will-change: transform;
    transform-origin: 50% 62%;   /* 节拍压缩围绕狗身体中下部进行 */
  }
  #dog-inner {
    position: relative;
    width: var(--scene-unit);
    will-change: transform;   /* 叫弹簧跳由 JS 逐帧驱动（无 CSS transition，保证果断跟手） */
  }
  /* 长按果冻层：transform / 变红滤镜全部由 JS 逐帧驱动（Q弹 + 高频抖动） */
  #dog-jelly {
    position: relative;
    will-change: transform, filter;
  }
  #dog-inner img {
    width: 100%;
    display: block;
    filter: drop-shadow(0 18px 40px rgba(135, 131, 126, .4));
  }
  /* 张嘴图叠在闭嘴图之上：下层始终不透明，只切换上层透明度，
     避免交叉淡化时两张图都半透明导致整体变透明 */
  #dog-open {
    position: absolute;
    left: 0; top: 0;
    opacity: 0;
    transition: opacity .08s linear;
  }
  #dog-inner.bark-image #dog-open { opacity: 1; }

  /* 哈基米的两张图轮廓不同，单独改为互斥可见，避免透明区域露出闭嘴图。 */
  #dog-inner.is-hajimi #dog-open {
    visibility: hidden;
    transition: none;
  }
  #dog-inner.is-hajimi.bark-image #dog-close { visibility: hidden; }
  #dog-inner.is-hajimi.bark-image #dog-open { visibility: visible; }

  /* 顶部控制：互动时隐藏，闲置 2 秒后由 JS 淡入 */
  #top-controls {
    position: absolute;
    top: max(14px, env(safe-area-inset-top));
    left: max(14px, env(safe-area-inset-left));
    right: max(14px, env(safe-area-inset-right));
    z-index: 20;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    opacity: 0;
    transform: translateY(-8px);
    pointer-events: none;
    /* 投影放在容器上：按钮本体用了 clip-path 切角，box-shadow 会被一起裁掉，
       容器的 drop-shadow 才能贴合八边形轮廓 */
    filter: drop-shadow(0 6px 14px rgba(135, 131, 126, .22));
    transition: opacity .5s ease, transform .5s cubic-bezier(.2, .8, .2, 1);
  }
  #top-controls.is-visible {
    opacity: 1;
    transform: translateY(0);
  }
  #top-controls.is-revealing-fast {
    transition-duration: .2s;
  }
  /* 有未读红点时只固定设置入口；音乐/音效按钮仍按原规则隐藏。 */
  #audio-controls {
    opacity: 1;
    transform: translateY(0);
    transition: opacity .5s ease, transform .5s cubic-bezier(.2, .8, .2, 1);
  }
  #top-controls.has-update-dot:not(.is-visible) {
    opacity: 1;
    transform: translateY(0);
  }
  #top-controls.has-update-dot:not(.is-visible) #audio-controls {
    opacity: 0;
    transform: translateY(-8px);
  }
  #top-controls.has-update-dot:not(.is-visible) #audio-controls .control-button {
    pointer-events: none;
  }
  .control-group {
    display: flex;
    gap: 8px;
  }
  /* 几何化切角按钮：八边形轮廓呼应全屏几何特效（hexagon / diamond 粒子）。
     按钮本体背景充当“描边色”，::before 用缩小一号的同款切角多边形铺底色，
     描边因此能严格贴合切角（普通 border 做不到），颜色用变量一键切换 */
  .control-button {
    --btn-edge: rgba(135, 131, 126, .72);   /* 描边色 */
    --btn-fill: rgba(255, 242, 220, .92);   /* 底色 */
    position: relative;
    min-width: 68px;
    min-height: 44px;
    padding: 8px 12px;
    border: none;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    color: var(--gray);
    background: var(--btn-edge);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    font: 700 13px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    cursor: pointer;
    pointer-events: auto;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transform: scale(var(--rhythm-scale, 1));
    transition: color .2s ease, background .2s ease;
  }
  .control-button::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: -1;
    background: var(--btn-fill);
    clip-path: polygon(8px 0, calc(100% - 8px) 0, 100% 8px, 100% calc(100% - 8px),
                       calc(100% - 8px) 100%, 8px 100%, 0 calc(100% - 8px), 0 8px);
    transition: background .2s ease;
  }
  /* 律动缩放由 JS 使用 Web Audio 时钟逐帧写入，避免切换静音时相位重置 */
  .control-button:active { transform: scale(.94); }
  .control-button:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 2px;
  }
  /* 悬停描边变琥珀色（仅桌面端）；.is-muted 规则在更后面，静音态优先 */
  @media (hover: hover) {
    .control-button:hover { --btn-edge: rgba(255, 180, 0, .85); }
  }
  .control-button svg {
    width: 20px;
    height: 20px;
    overflow: visible;
    fill: none;
    stroke: currentColor;
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .control-button .mute-slash {
    opacity: 0;
    stroke: var(--coral);
    stroke-width: 2.6;
    transition: opacity .2s ease;
  }
  .control-button.is-muted {
    --btn-edge: rgba(255, 90, 95, .68);
    --btn-fill: rgba(255, 255, 255, .94);
    color: var(--coral);
  }
  .control-button.is-muted .mute-slash { opacity: 1; }

  /* 设置按钮红点：八边形呼应几何特效，珊瑚色点缀；外圈米白描边让它从按钮上跳出来。
     律动缩放由 JS 随节拍写入 --rhythm-scale（同控制按钮）。 */
  #settings-wrap { position: relative; }
  #update-dot {
    position: absolute;
    top: -5px;
    right: -5px;
    z-index: 2;
    width: 15px;
    height: 15px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 250, 240, .96);
    clip-path: polygon(32% 0, 68% 0, 100% 32%, 100% 68%, 68% 100%, 32% 100%, 0 68%, 0 32%);
    filter: drop-shadow(0 0 3px rgba(255, 90, 95, .55));
    pointer-events: none;
    transform: scale(var(--rhythm-scale, 1));
    will-change: transform;
  }
  #update-dot::before {
    content: "";
    width: 9px;
    height: 9px;
    background: var(--coral);
    clip-path: polygon(32% 0, 68% 0, 100% 32%, 100% 68%, 68% 100%, 32% 100%, 0 68%, 0 32%);
  }
  #update-dot.is-hidden { display: none; }

  /* Toy SDK 状态提示：不打断演奏，也不会把点击穿透到舞台。 */
  #toy-notice {
    position: absolute;
    left: 50%;
    bottom: max(24px, calc(env(safe-area-inset-bottom) + 16px));
    z-index: 60;
    width: min(420px, calc(100% - 32px));
    padding: 12px 16px;
    color: #6f6a63;
    background: rgba(255, 250, 240, .97);
    border: 2px solid rgba(255, 180, 0, .72);
    border-radius: 12px;
    box-shadow: 0 10px 28px rgba(135, 131, 126, .24);
    font-size: 13px;
    font-weight: 650;
    line-height: 1.55;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, 12px) scale(.98);
    transition: opacity .2s ease, transform .2s ease;
  }
  #toy-notice.is-visible {
    opacity: 1;
    transform: translate(-50%, 0) scale(1);
  }
  #toy-notice.is-error {
    color: #9e4145;
    border-color: rgba(255, 90, 95, .72);
  }
  @media (max-width: 430px) {
    #top-controls {
      top: max(10px, env(safe-area-inset-top));
      left: max(10px, env(safe-area-inset-left));
      right: max(10px, env(safe-area-inset-right));
    }
    .control-button {
      min-width: 44px;
      padding-inline: 10px;
    }
    .control-button span { display: none; }
    #author-link {
      right: max(10px, env(safe-area-inset-right));
      bottom: max(10px, env(safe-area-inset-bottom));
      min-width: 0;
      max-width: calc(100% - 20px);
      padding: 8px 9px 7px 12px;
    }
    .author-copy { width: 106px; }
    .author-name {
      width: calc(100% + 4px);
      margin-left: -2px;
      font-size: 15px;
    }
  }

  /* 开始遮罩（首次点击解锁音频） */
  #overlay {
    position: absolute;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    gap: 2.2vmin;
    align-items: center;
    justify-content: center;
    background: rgba(255, 242, 220, .9);
    transition: opacity .5s ease;
    cursor: pointer;
  }
  #overlay.hide { opacity: 0; pointer-events: none; }
  #overlay .title {
    font-size: clamp(34px, 8vmin, 72px);
    font-weight: 900;
    letter-spacing: .18em;
    color: var(--amber);
  }
  #overlay .title em { font-style: normal; color: var(--gray); }
  #overlay .sub {
    font-size: clamp(13px, 2.4vmin, 18px);
    letter-spacing: .5em;
    color: var(--gray);
    animation: pulse 1.6s ease-in-out infinite;
  }
  @keyframes pulse { 50% { opacity: .35; } }

  /* 设置菜单：与开始遮罩同款的半透明米白背景，盖在所有常驻元素之上 */
  #settings-overlay {
    position: absolute;
    inset: 0;
    z-index: 40;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 22px;
    background: rgba(255, 242, 220, .88);
    opacity: 0;
    pointer-events: none;
    transition: opacity .28s ease;
  }
  #settings-overlay.is-open {
    opacity: 1;
    pointer-events: auto;
  }
  /* 面板沿用控制按钮的切角描边手法：外框充当描边色，::before 铺底色 */
  #settings-panel {
    position: relative;
    width: min(384px, 100%);
    background: rgba(135, 131, 126, .5);
    clip-path: polygon(18px 0, calc(100% - 18px) 0, 100% 18px, 100% calc(100% - 18px),
                       calc(100% - 18px) 100%, 18px 100%, 0 calc(100% - 18px), 0 18px);
    filter: drop-shadow(0 14px 34px rgba(135, 131, 126, .3));
    transform: translateY(10px) scale(.97);
    transition: transform .32s cubic-bezier(.2, .8, .2, 1);
  }
  #settings-overlay.is-open #settings-panel {
    transform: translateY(0) scale(1);
  }
  #settings-panel::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: -1;
    background: rgba(255, 250, 240, .97);
    clip-path: polygon(16px 0, calc(100% - 16px) 0, 100% 16px, 100% calc(100% - 16px),
                       calc(100% - 16px) 100%, 16px 100%, 0 calc(100% - 16px), 0 16px);
  }
  .settings-scroll {
    max-height: min(740px, calc(100vh - 44px));
    overflow-y: auto;
    padding: 14px 16px 16px;
    /* 细滚动条：透明轨道 + 琥珀色滑块，不得不滚动时也保持简洁美观 */
    scrollbar-width: thin;
    scrollbar-color: rgba(255, 180, 0, .45) transparent;
  }
  .settings-scroll::-webkit-scrollbar { width: 6px; }
  .settings-scroll::-webkit-scrollbar-track { background: transparent; }
  .settings-scroll::-webkit-scrollbar-thumb {
    background: rgba(255, 180, 0, .45);
    border-radius: 999px;
  }
  .settings-scroll::-webkit-scrollbar-thumb:hover {
    background: rgba(255, 180, 0, .7);
  }
  .settings-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .settings-title {
    font-size: 19px;
    font-weight: 900;
    letter-spacing: .3em;
    color: var(--amber);
  }
  .settings-title em { font-style: normal; color: var(--gray); }
  #settings-close {
    min-width: 40px;
    min-height: 36px;
    padding: 6px;
  }
  .settings-section { margin-top: 10px; }
  .settings-section:first-of-type { margin-top: 0; }
  .settings-label {
    margin-bottom: 6px;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .24em;
    color: rgba(135, 131, 126, .78);
    text-transform: uppercase;
    white-space: nowrap;
  }

  /* 演奏设置：整行可点的切角行（同音效卡的描边/底色手法），右侧几何开关。
     开启时行底变淡黄、描边与开关变琥珀色，与音效选中态同一语言。 */
  .performance-settings {
    display: grid;
    gap: 6px;
  }
  .setting-row {
    --btn-edge: rgba(135, 131, 126, .42);
    --btn-fill: rgba(255, 255, 255, .62);
    position: relative;
    isolation: isolate;   /* 让 ::before 底色保持在描边之上、内容之下 */
    width: 100%;
    min-height: 50px;
    padding: 8px 12px;
    border: none;
    display: flex;
    align-items: center;
    gap: 12px;
    color: var(--gray);
    background: var(--btn-edge);
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px),
                       calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
    font: inherit;
    text-align: left;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: background .2s ease, opacity .2s ease;
  }
  .setting-row::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: -1;
    background: var(--btn-fill);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    transition: background .2s ease;
  }
  @media (hover: hover) {
    .setting-row:not(:disabled):hover { --btn-edge: rgba(255, 180, 0, .72); }
  }
  .setting-row:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .34);
    outline-offset: 2px;
  }
  .setting-row:disabled {
    opacity: .58;
    cursor: not-allowed;
  }
  .setting-row[aria-checked="true"] {
    --btn-edge: rgba(255, 180, 0, .78);
    --btn-fill: rgba(255, 244, 224, .96);
  }
  .setting-copy {
    flex: 1;
    min-width: 0;
  }
  .setting-name {
    display: block;
    color: #6f6a63;
    font-size: 13px;
    font-weight: 750;
    line-height: 1.35;
  }
  .setting-row[aria-checked="true"] .setting-name { color: #b57e00; }
  .setting-description {
    display: block;
    margin-top: 2px;
    color: rgba(135, 131, 126, .82);
    font-size: 11px;
    line-height: 1.4;
  }
  /* 几何开关：八边形轨道 + 八边形滑块，滑块中央的状态点随档位变色 */
  .setting-switch {
    position: relative;
    flex: none;
    width: 46px;
    height: 26px;
    background: rgba(135, 131, 126, .38);
    clip-path: polygon(9px 0, calc(100% - 9px) 0, 100% 9px, 100% calc(100% - 9px),
                       calc(100% - 9px) 100%, 9px 100%, 0 calc(100% - 9px), 0 9px);
    transition: background .22s ease;
  }
  .setting-switch::after {
    content: "";
    position: absolute;
    left: 4px;
    top: 4px;
    width: 18px;
    height: 18px;
    background: #fffaf0;
    clip-path: polygon(6px 0, calc(100% - 6px) 0, 100% 6px, 100% calc(100% - 6px),
                       calc(100% - 6px) 100%, 6px 100%, 0 calc(100% - 6px), 0 6px);
    filter: drop-shadow(0 2px 3px rgba(80, 76, 71, .3));
    transition: transform .22s cubic-bezier(.2, .8, .2, 1);
  }
  .setting-switch::before {
    content: "";
    position: absolute;
    left: 10px;
    top: 10px;
    z-index: 1;
    width: 6px;
    height: 6px;
    background: rgba(135, 131, 126, .5);
    clip-path: polygon(32% 0, 68% 0, 100% 32%, 100% 68%, 68% 100%, 32% 100%, 0 68%, 0 32%);
    transition: transform .22s cubic-bezier(.2, .8, .2, 1), background .2s ease;
  }
  .setting-row[aria-checked="true"] .setting-switch { background: var(--amber); }
  .setting-row[aria-checked="true"] .setting-switch::after { transform: translateX(20px); }
  .setting-row[aria-checked="true"] .setting-switch::before {
    transform: translateX(20px);
    background: rgba(255, 180, 0, .9);
  }
  #performance-settings-status {
    margin-top: 6px;
    padding: 0 2px;
    color: rgba(135, 131, 126, .78);
    font-size: 10px;
    line-height: 1.45;
  }
  #performance-settings-status.is-error { color: #9e4145; }

  /* 作者卡：八边形头像 + 主页按钮 */
  .author-card {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .author-avatar {
    flex: none;
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 180, 0, .65);
    clip-path: polygon(14px 0, calc(100% - 14px) 0, 100% 14px, 100% calc(100% - 14px),
                       calc(100% - 14px) 100%, 14px 100%, 0 calc(100% - 14px), 0 14px);
  }
  .author-avatar img {
    width: calc(100% - 4px);
    height: calc(100% - 4px);
    object-fit: cover;
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px),
                       calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
  }
  .author-info {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .author-id {
    font: 700 17px/1.25 "Noto Serif SC", "Songti SC", SimSun, serif;
    color: var(--amber);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .author-sub {
    font-size: 10px;
    letter-spacing: .18em;
    color: rgba(135, 131, 126, .78);
    text-transform: uppercase;
  }
  #author-home-button {
    min-width: 64px;
    min-height: 38px;
    padding: 6px 10px;
    font-size: 12px;
  }

  /* 开发视频卡：16:9 封面 + 播放角标 + 标题 */
  .video-card {
    display: block;
    width: 100%;
    padding: 0;
    border: none;
    background: none;
    text-align: left;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  .video-cover {
    position: relative;
    display: block;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: rgba(135, 131, 126, .35);
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px),
                       calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
  }
  .video-cover::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: 1;
    pointer-events: none;
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
  }
  .video-cover img {
    position: absolute;
    inset: 2px;
    width: calc(100% - 4px);
    height: calc(100% - 4px);
    object-fit: cover;
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    transition: transform .35s ease;
  }
  .video-play {
    position: absolute;
    left: 50%;
    top: 50%;
    z-index: 2;
    width: 46px;
    height: 46px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 250, 240, .88);
    clip-path: polygon(30% 0, 70% 0, 100% 30%, 100% 70%, 70% 100%, 30% 100%, 0 70%, 0 30%);
    transform: translate(-50%, -50%) scale(var(--rhythm-scale, 1));
    will-change: transform;
  }
  .video-play svg {
    width: 20px;
    height: 20px;
    margin-left: 2px;
    fill: var(--amber);
    stroke: none;
  }
  .video-title {
    display: -webkit-box;
    -webkit-box-orient: vertical;
    -webkit-line-clamp: 2;
    overflow: hidden;
    margin-top: 7px;
    padding: 0 2px;
    font-size: 13px;
    font-weight: 600;
    line-height: 1.5;
    color: #6f6a63;
    transition: color .2s ease;
  }
  @media (hover: hover) {
    .video-card:hover .video-cover img { transform: scale(1.04); }
    .video-card:hover .video-title { color: var(--amber); }
  }
  .video-card:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 2px;
  }

  /* 音效三选一：切角小卡，选中态描边变琥珀色 */
  .sfx-options {
    display: flex;
    gap: 10px;
  }
  .sfx-option {
    --btn-edge: rgba(135, 131, 126, .45);
    --btn-fill: rgba(255, 255, 255, .6);
    position: relative;
    isolation: isolate;   /* 让 ::before 底色保持在描边之上、内容之下 */
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 10px 4px 9px;
    border: none;
    color: var(--gray);
    background: var(--btn-edge);
    clip-path: polygon(12px 0, calc(100% - 12px) 0, 100% 12px, 100% calc(100% - 12px),
                       calc(100% - 12px) 100%, 12px 100%, 0 calc(100% - 12px), 0 12px);
    font: 600 12px/1 "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
    cursor: pointer;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
    transition: color .2s ease, background .2s ease;
  }
  .sfx-option::before {
    content: "";
    position: absolute;
    inset: 2px;
    z-index: -1;
    background: var(--btn-fill);
    clip-path: polygon(10px 0, calc(100% - 10px) 0, 100% 10px, 100% calc(100% - 10px),
                       calc(100% - 10px) 100%, 10px 100%, 0 calc(100% - 10px), 0 10px);
    transition: background .2s ease;
  }
  .sfx-option.is-active {
    --btn-edge: rgba(255, 180, 0, .92);
    --btn-fill: rgba(255, 244, 224, .96);   /* 淡黄底 + 琥珀描边，呼应控制按钮的浅色语言 */
    color: #d88f00;
  }
  .sfx-option.is-locked {
    --btn-edge: rgba(135, 131, 126, .42);
    --btn-fill: rgba(242, 239, 233, .94);
  }
  .sfx-option.is-locked .sfx-icon,
  .sfx-option.is-locked .sfx-name { opacity: .52; }
  .sfx-status {
    position: absolute;
    top: 6px;
    right: 6px;
    z-index: 2;
    display: flex;
    align-items: center;
    gap: 4px;
    pointer-events: none;
  }
  .sfx-new {
    padding: 3px 5px 2px;
    color: #fffaf0;
    background: var(--coral);
    border-radius: 999px;
    font-size: 8px;
    font-weight: 900;
    line-height: 1;
    letter-spacing: .08em;
    box-shadow: 0 2px 6px rgba(255, 90, 95, .28);
  }
  .sfx-lock {
    width: 19px;
    height: 19px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #77736e;
    background: rgba(255, 250, 240, .94);
    border-radius: 50%;
    box-shadow: 0 2px 6px rgba(135, 131, 126, .24);
  }
  .sfx-lock svg {
    width: 11px;
    height: 11px;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .sfx-option:not(.is-locked) .sfx-lock,
  .sfx-option.is-new-hidden .sfx-new { display: none; }
  .sfx-icon {
    width: 44px;
    height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .sfx-icon img {
    width: 42px;
    height: 42px;
    object-fit: contain;
    filter: drop-shadow(0 4px 8px rgba(135, 131, 126, .35));
  }
  .sfx-icon svg {
    width: 36px;
    height: 36px;
    overflow: visible;
    fill: none;
    stroke: currentColor;
    stroke-width: 2.4;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .sfx-option:active { transform: scale(.96); }
  .sfx-option:focus-visible {
    outline: 3px solid rgba(62, 123, 250, .38);
    outline-offset: 2px;
  }

  @media (max-width: 430px) {
    #settings-overlay { padding: 14px; }
    .settings-scroll { padding: 12px 13px 14px; }
    .author-avatar { width: 46px; height: 46px; }
    .author-id { font-size: 15px; }
  }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="fx"></canvas>
    <a id="author-link" href="https://space.bilibili.com/357762853" aria-label="打开作者哔哩哔哩主页">
      <span class="author-copy" aria-hidden="true">
        <span class="author-label">Created by</span>
        <span class="author-name">MarkCup</span>
      </span>
    </a>
    <div id="key-grid" aria-hidden="true"></div>
    <div id="zoneflash"></div>

    <div id="dog">
      <div id="dog-inner">
        <div id="dog-jelly">
          <img id="dog-close" src="Image/dagou_close_mouth.png" alt="大狗" draggable="false" />
          <img id="dog-open" src="Image/dagou_open_mouth.png" alt="" draggable="false" />
        </div>
      </div>
    </div>

    <div id="top-controls" class="is-visible has-update-dot" aria-label="声音与导航控制">
      <div id="audio-controls" class="control-group">
        <button id="music-toggle" class="control-button" type="button" aria-label="关闭音乐" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M9 18V5l10-2v13" />
            <circle cx="6" cy="18" r="3" />
            <circle cx="16" cy="16" r="3" />
            <path class="mute-slash" d="M4 3l16 18" />
          </svg>
          <span>音乐</span>
        </button>
        <button id="sfx-toggle" class="control-button" type="button" aria-label="关闭音效" aria-pressed="false">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M5 9v6h4l5 4V5L9 9H5z" />
            <path d="M17 9.5a4 4 0 010 5" />
            <path class="mute-slash" d="M4 3l16 18" />
          </svg>
          <span>音效</span>
        </button>
      </div>
      <div id="settings-wrap">
        <button id="settings-button" class="control-button" type="button" aria-label="打开设置菜单" aria-haspopup="dialog">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="12" cy="12" r="3.4" />
            <path d="M12 2.6v3M12 18.4v3M2.6 12h3M18.4 12h3M5.3 5.3l2.1 2.1M16.6 16.6l2.1 2.1M18.7 5.3l-2.1 2.1M7.4 16.6l-2.1 2.1" />
          </svg>

    </div>

    <div id="settings-overlay" aria-hidden="true">
      <div id="settings-panel" role="dialog" aria-modal="true" aria-label="设置">
        <div class="settings-scroll">
          <div class="settings-head">
            <div class="settings-title">设<em>置</em></div>
            <button id="settings-close" class="control-button" type="button" aria-label="关闭设置">
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 6l12 12M18 6L6 18" />
              </svg>
            </button>
          </div>

          <section class="settings-section" aria-label="作者">
            <div class="settings-label">作者 · Creator</div>
            <div class="author-card">
              <span class="author-avatar"><img src="Image/creator-avatar.jpg" alt="马克杯MarkCup 的头像" draggable="false" /></span>
              <div class="author-info">
                <div class="author-id">马克杯MarkCup</div>
                <div class="author-sub">bilibili 创作者</div>
              </div>
              <button id="author-home-button" class="control-button" type="button" aria-label="前往作者哔哩哔哩主页">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M4 11.5L12 4l8 7.5" />
                  <path d="M6.5 10v9.5h11V10" />
                </svg>
                主页
              </button>
            </div>
          </section>

          <section class="settings-section" aria-label="开发视频">
            <div class="settings-label">开发视频 · Dev Video</div>
            <button id="video-card" class="video-card" type="button" aria-label="打开视频：点击即玩世界上最爽的大狗叫模拟器">
              <span class="video-cover">
                <img src="Image/video.png" alt="开发视频封面" draggable="false" />

                  <svg viewBox="0 0 24 24"><path d="M9 7l8 5-8 5z" /></svg>

          <section class="settings-section" aria-label="音效">

              <button class="sfx-option is-locked" type="button" role="radio" aria-checked="false" aria-label="叮咚鸡，未解锁" data-sfx="dingdong">

              <button class="sfx-option is-locked" type="button" role="radio" aria-checked="false" aria-label="哈基米，未解锁" data-sfx="hajimi">
                <span class="sfx-status" aria-hidden="true">
                  <span class="sfx-new">NEW</span>

              <button class="setting-row" id="piano-mode-setting" type="button" role="switch" aria-checked="false" data-setting="pianoMode" disabled>

                  <span class="setting-description">启用节奏吸附</span>
                </span>
                <span class="setting-switch" aria-hidden="true"></span>

              <button class="setting-row" id="show-grid-setting" type="button" role="switch" aria-checked="false" data-setting="showGrid" disabled>
                <span class="setting-copy">
                  <span class="setting-name">显示网格</span>
                  <span class="setting-description">显示按键的网格</span>
                </span>
                <span class="setting-switch" aria-hidden="true"></span>
              </button>
            </div>
            <div id="performance-settings-status" role="status">正在读取哔哩哔哩云端设置…</div>
          </section>
        </div>
      </div>
    </div>

    <div id="toy-notice" role="status" aria-live="assertive" aria-atomic="true" aria-hidden="true"></div>

    <div id="overlay">
      <div class="title">大狗<em>Tap</em></div>
      <div class="sub">点 击 任 意 位 置 开 始</div>
    </div>
  </div>

  <script src="audio-data.js?v=20260721-hajimi-new"></script>
  <script src="main.js?v=20260721-hajimi-new-final"></script>
